<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bodasesor Eventos</title>
    <meta name="description" content="Banquetes premium, catering gourmet y mobiliario elegante para eventos corporativos, bodas y celebraciones en todo México" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Bodasesor Eventos" />
    <meta property="og:description" content="Encuentra todo para tu evento en un solo lugar" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preload" as="image" href="/images/hero-bg-new-mobile.webp" type="image/webp" media="(max-width: 768px)" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/hero-bg-new.webp" type="image/webp" media="(min-width: 769px)" fetchpriority="high" />
    <script>
      if (/^\/(products|collections|blogs|pages)\//.test(location.pathname)) {
        var s = document.createElement('script');
        s.src = '/legacy-redirect-boot.js';
        document.head.appendChild(s);
      }
    </script>
    <style>
      body{margin:0;font-family:Georgia,'Times New Roman',serif}
      #lcp-hero-wrap{position:fixed;inset:0;z-index:0;margin:0;pointer-events:none}
      #lcp-hero-wrap img{width:100%;height:100%;object-fit:cover;object-position:center}
      #lcp-hero-wrap::after{content:"";position:absolute;inset:0;background:#16204099}
      #root{position:relative;z-index:1;min-height:100vh}
      #static-hero-copy{position:fixed;left:0;right:0;top:7rem;z-index:2;max-width:80rem;margin:0 auto;padding:0 1rem;text-align:center;pointer-events:none}
      #static-hero-copy h1{margin:0 0 1.5rem;color:#fff;font-size:2.25rem;line-height:1.2;font-weight:700}
      #static-hero-copy .hero-sub{margin:0 auto 2rem;color:#f5efe8;font-size:1.125rem;line-height:1.5;max-width:36rem}
      #static-hero-copy .hero-btns{display:flex;flex-direction:column;gap:1rem;align-items:center;pointer-events:auto}
      #static-hero-copy .btn-wa{display:inline-block;background:#25D366;color:#fff;padding:1rem 2rem;border-radius:0.5rem;font-weight:700;text-decoration:none;font-size:1.125rem}
      #static-hero-copy .btn-svc{display:inline-block;background:#fff;color:#162040;padding:1rem 2rem;border-radius:0.5rem;font-weight:700;text-decoration:none;border:2px solid #fff;font-size:1.125rem}
      #static-nav-shell{position:fixed;top:0;left:0;right:0;z-index:50;pointer-events:none}
      #static-nav-shell .nav-top{height:4rem;background:#162040}
      #static-nav-shell .nav-sub{height:3rem;background:#fff;box-shadow:0 4px 6px -1px rgb(0 0 0/.1)}
      @media (min-width:640px){#static-hero-copy .hero-btns{flex-direction:row;justify-content:center;gap:1.5rem}}
      @media (min-width:768px){#static-hero-copy{top:8rem}#static-hero-copy h1{font-size:4.5rem}#static-hero-copy .hero-sub{font-size:1.25rem}}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="static-nav-shell" aria-hidden="true">
      <div class="nav-top"></div>
      <div class="nav-sub"></div>
    </div>
    <picture id="lcp-hero-wrap" aria-hidden="true">
      <source media="(max-width: 768px)" srcset="/images/hero-bg-new-mobile.webp" type="image/webp" />
      <source srcset="/images/hero-bg-new.webp" type="image/webp" />
      <img
        id="lcp-hero"
        src="/images/hero-bg-new-mobile.webp"
        alt=""
        width="768"
        height="419"
        fetchpriority="high"
        decoding="async"
      />
    </picture>
    <div id="static-hero-copy" aria-hidden="true">
      <h1>Encuentra todo para tu evento en un solo lugar</h1>
      <p class="hero-sub">Banquetes premium, catering gourmet y mobiliario elegante para eventos corporativos, bodas y celebraciones en todo México</p>
      <div class="hero-btns">
        <a class="btn-wa" href="https://api.whatsapp.com/send/?phone=5215540080373&amp;text=Hola%2C%20me%20gustar%C3%ADa%20cotizar%20un%20evento">Cotiza por WhatsApp</a>
        <a class="btn-svc" href="#servicios">Ver servicios</a>
      </div>
    </div>
    <script>
      (function () {
        var p = location.pathname.replace(/\/+$/, '') || '/';
        if (p === '/') return;
        var slug = p.slice(1);
        var cities = 'ciudad-de-mexico,cdmx,estado-de-mexico,aguascalientes,acapulco,cancun,cozumel,cuernavaca,guadalajara,leon,los-cabos,merida,monterrey,morelia,oaxaca,pachuca,puebla,puerto-vallarta,vallarta,queretaro,san-luis-potosi,san-miguel-allende,tijuana,toluca,torreon,valle-de-bravo,veracruz';
        if (cities.indexOf(slug) >= 0) return;
        ['static-hero-copy', 'lcp-hero-wrap', 'static-nav-shell'].forEach(function (id) {
          var el = document.getElementById(id);
          if (el) el.style.display = 'none';
        });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
