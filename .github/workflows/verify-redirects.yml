name: Verify Redirects

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Guard redirect config (pre-build)
        run: node scripts/guard-redirects.mjs

      - name: Build with redirect verification
        run: npm run build
        env:
          SITE_BASE: https://bodasesor.com
