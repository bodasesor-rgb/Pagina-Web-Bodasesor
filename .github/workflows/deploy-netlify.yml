name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (SPA + merge Nexus/SEO pages)
        run: npm run build:nexus
        env:
          SITE_BASE: https://bodasesor.com
          NEXUS_URL: https://white-ferret-567834.hostingersite.com
          SKIP_NETLIFY_ZIP: "1"
          SEO_SYNC_CONCURRENCY: "3"
          MIN_NEXUS_LANDINGS: "1200"

      - name: Deploy merged dist to Netlify production
        run: npx netlify-cli deploy --prod --dir=dist --no-build --site="${{ secrets.NETLIFY_SITE_ID }}" --message="SPA + preserved Nexus SEO pages"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Verify Nexus SEO landings in production
        run: node scripts/verify-nexus-production.mjs

      - name: Verify legacy redirects in production
        run: node scripts/check-production-redirects.mjs
