name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          SITE_BASE: https://bodasesor.com

      - name: Verify Netlify credentials
        id: netlify_creds
        run: |
          if [ -n "$NETLIFY_AUTH_TOKEN" ] && [ -n "$NETLIFY_SITE_ID" ]; then
            echo "has_creds=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_creds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Netlify build hook
        if: steps.netlify_creds.outputs.has_creds != 'true' && env.NETLIFY_BUILD_HOOK != ''
        run: |
          echo "No API credentials — triggering Netlify build hook..."
          curl -fsS -X POST "$NETLIFY_BUILD_HOOK"
          echo "Build hook sent. Netlify will build from connected Git repo."

      - name: Fail if cannot deploy
        if: steps.netlify_creds.outputs.has_creds != 'true' && env.NETLIFY_BUILD_HOOK == ''
        run: |
          echo "::error::No hay NETLIFY_AUTH_TOKEN/SITE_ID ni NETLIFY_BUILD_HOOK."
          echo "El build pasó pero bodasesor.com NO se actualizó."
          echo "Opción A: Netlify → Deploys → Trigger deploy → Deploy site"
          echo "Opción B: Añadir secret NETLIFY_BUILD_HOOK (Build hooks en Netlify)"
          echo "Opción C: Añadir NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID en GitHub Secrets"
          exit 1

      - name: Deploy to Netlify
        if: steps.netlify_creds.outputs.has_creds == 'true'
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions (${{ github.sha }})"
