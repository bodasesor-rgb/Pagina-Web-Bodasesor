name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: netlify-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          SITE_BASE: https://bodasesor.com

      - name: Verify Netlify credentials
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ] || [ -z "$NETLIFY_SITE_ID" ]; then
            echo "::error::NETLIFY_AUTH_TOKEN o NETLIFY_SITE_ID no configurados en GitHub Secrets."
            echo "El build pasó pero NO se publicó a bodasesor.com."
            echo "Configura secrets en: Settings → Secrets → Actions"
            echo "O espera el deploy automático de Netlify (repo conectado → Build Active)."
            exit 1
          fi

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions (${{ github.sha }})"
