[build]
  # MUST run npm run build — generates dist/_redirects (4215+ rules) + edge map
  command = "node scripts/netlify-build.mjs"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  SITE_BASE = "https://bodasesor.com"

# Legacy Shopify redirects — DO NOT REMOVE
[[edge_functions]]
  function = "legacy-redirect"
  path = "/products/*"

[[edge_functions]]
  function = "legacy-redirect"
  path = "/collections/*"

[[edge_functions]]
  function = "legacy-redirect"
  path = "/blogs/*"

[[edge_functions]]
  function = "legacy-redirect"
  path = "/pages/*"

# SPA fallback is in dist/_redirects (last line: /* /index.html 200)
# Do NOT add [[redirects]] here — it can override _redirects on deploy

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/legacy-redirect-boot.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
