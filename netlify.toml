[build]
  command = "npm run build"
  publish = "dist"
  # Solo GitHub Actions publica. Evita que Netlify/Replit sobrescriban el sitio.
  ignore = "exit 0"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  SITE_BASE = "https://bodasesor.com"

[[edge_functions]]
  function = "legacy-redirect"
  path = "/products/*"

[[edge_functions]]
  function = "legacy-redirect"
  path = "/collections/*"

[[edge_functions]]
  function = "legacy-redirect"
  path = "/blogs/*"

[[edge_functions]]
  function = "legacy-redirect"
  path = "/pages/*"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
